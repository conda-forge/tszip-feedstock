{% set name = "tszip" %}
{% set version = "0.2.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0a619e60a157914cdf622485c24b98b7d07627e9d092bdda98f671cbc88d2835

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - tszip=tszip.cli:tszip_main
    - tsunzip=tszip.cli:tsunzip_main
  noarch: python

requirements:
  host:
    - setuptools
    - setuptools_scm
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - tskit >=0.3.3
    - numcodecs >=0.6.4
    - zarr >=2.17
    - humanize

test:
  requires:
    - python {{ python_min }}
  commands:
    - tszip -h
    - tsunzip -h
  imports:
    - tszip

about:
  home: http://github.com/tskit-dev/tszip
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Gzip-like compression utility for tskit tree sequences.
  description: |
    Tszip provides high-levels of compression for tskit tree sequence
    files, via a simple Python API and gzip-like command line interface.
  doc_url: https://tskit.dev/tszip/docs
  dev_url: https://github.com/tskit-dev/tszip

extra:
  recipe-maintainers:
    - jeromekelleher
    - benjeffery
    - petrelharp
